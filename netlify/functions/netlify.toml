[build]
  command = "npm run build"
  publish = "dist"

[[scheduled.functions]]
  function = "fetch-odds"
  cron = "0 14,20 * * *"

# Runs hourly so closing-line snapshots for logged picks get captured close
# to actual game time, not just whenever fetch-odds happens to run.
[[scheduled.functions]]
  function = "capture-closing-lines"
  cron = "0 * * * *"

# Runs 30 min after each fetch-odds cycle so today's props exist before the
# stats model tries to project them.
[[scheduled.functions]]
  function = "compute-projections"
  cron = "30 14,20 * * *"
